spring.application.name=bff-gateway

# Puerto donde escuchará el BFF/API Gateway
server.port=8082

# URLs internas de los microservicios (usando el nombre de los contenedores Docker)
microservicio.mascotas.url=http://sanos_ms_mascotas:8080/api/v1/mascotas
microservicio.geolocalizacion.url=http://sanos_ms_geolocalizacion:8081/api/v1/geolocalizacion

# Configuración de Clerk para validar los JWT (Reemplaza con tu URL real de Clerk)
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://tu-clerk-issuer-url.clerk.accounts.dev/